name: CSI Regression Suite

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  schedule:
    # Nightly regression run at 2 AM UTC
    - cron: '0 2 * * *'
  workflow_dispatch:
    inputs:
      tags:
        description: 'Test tags to filter (e.g. @p1, @smoke, @regression)'
        required: false
        default: '@regression'
      environment:
        description: 'Target environment URL'
        required: false
        default: 'https://personal-oajqxmji.outsystemscloud.com/QATestApp'
      use_browserstack:
        description: 'Run on BrowserStack?'
        required: false
        default: 'false'
        type: choice
        options: ['false', 'true']

concurrency:
  group: regression-${{ github.ref }}
  cancel-in-progress: true

env:
  BASE_URL: ${{ inputs.environment || 'https://personal-oajqxmji.outsystemscloud.com/QATestApp' }}
  USE_BROWSERSTACK: ${{ inputs.use_browserstack || 'false' }}
  BUILD_ID: ${{ github.sha }}

jobs:
  # ─── Job 1: Smoke tests (fast gate) ──────────────────────────────────────
  smoke:
    name: Smoke Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run smoke tests
        run: npx playwright test --grep @smoke --project=chromium
        env:
          SUPER_ADMIN_USER: ${{ secrets.SUPER_ADMIN_USER }}
          SUPER_ADMIN_PASS: ${{ secrets.SUPER_ADMIN_PASS }}
          END_USER_USER: ${{ secrets.END_USER_USER }}
          END_USER_PASS: ${{ secrets.END_USER_PASS }}

      - name: Upload smoke test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: smoke-results
          path: |
            allure-results/
            playwright-report/
            test-results/
          retention-days: 7

  # ─── Job 2: Full P1 regression (cross-browser) ───────────────────────────
  regression-p1:
    name: P1 Regression – ${{ matrix.browser }}
    needs: smoke
    runs-on: ubuntu-latest
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        browser: [chromium, firefox, webkit]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps ${{ matrix.browser }}

      - name: Run P1 regression tests
        run: npx playwright test --grep @p1 --project=${{ matrix.browser }}
        env:
          SUPER_ADMIN_USER: ${{ secrets.SUPER_ADMIN_USER }}
          SUPER_ADMIN_PASS: ${{ secrets.SUPER_ADMIN_PASS }}
          SYSTEM_OWNER_USER: ${{ secrets.SYSTEM_OWNER_USER }}
          SYSTEM_OWNER_PASS: ${{ secrets.SYSTEM_OWNER_PASS }}
          ADMIN_USER: ${{ secrets.ADMIN_USER }}
          ADMIN_PASS: ${{ secrets.ADMIN_PASS }}
          TRAINING_ADMIN_USER: ${{ secrets.TRAINING_ADMIN_USER }}
          TRAINING_ADMIN_PASS: ${{ secrets.TRAINING_ADMIN_PASS }}
          END_USER_USER: ${{ secrets.END_USER_USER }}
          END_USER_PASS: ${{ secrets.END_USER_PASS }}

      - name: Upload P1 results (${{ matrix.browser }})
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: p1-results-${{ matrix.browser }}
          path: |
            allure-results/
            playwright-report/
            test-results/
          retention-days: 14

  # ─── Job 3: BrowserStack cross-device (nightly only) ─────────────────────
  browserstack:
    name: BrowserStack Cross-Device
    needs: smoke
    runs-on: ubuntu-latest
    timeout-minutes: 60
    if: github.event_name == 'schedule' || inputs.use_browserstack == 'true'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run on BrowserStack
        run: npx playwright test --grep @p1
        env:
          USE_BROWSERSTACK: 'true'
          BROWSERSTACK_USER: ${{ secrets.BROWSERSTACK_USER }}
          BROWSERSTACK_KEY: ${{ secrets.BROWSERSTACK_KEY }}
          SUPER_ADMIN_USER: ${{ secrets.SUPER_ADMIN_USER }}
          SUPER_ADMIN_PASS: ${{ secrets.SUPER_ADMIN_PASS }}
          END_USER_USER: ${{ secrets.END_USER_USER }}
          END_USER_PASS: ${{ secrets.END_USER_PASS }}

      - name: Upload BrowserStack results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: browserstack-results
          path: allure-results/
          retention-days: 30

  # ─── Job 4: Allure Report generation and publish ─────────────────────────
  allure-report:
    name: Publish Allure Report
    needs: [regression-p1]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - uses: actions/checkout@v4

      - name: Download all test artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: '*-results*'
          merge-multiple: true
          path: allure-results/

      - name: Set up Java (required by Allure CLI)
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install Allure CLI
        run: npm install -g allure-commandline

      - name: Generate Allure Report
        run: allure generate allure-results --clean -o allure-report

      - name: Upload Allure Report
        uses: actions/upload-artifact@v4
        with:
          name: allure-report
          path: allure-report/
          retention-days: 30

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        if: github.ref == 'refs/heads/main'
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: allure-report
          destination_dir: allure-report

      - name: Comment PR with report link
        uses: actions/github-script@v7
        if: github.event_name == 'pull_request'
        with:
          script: |
            const sha = context.sha.substring(0, 7);
            const repoUrl = `https://${context.repo.owner}.github.io/${context.repo.repo}`;
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `## 🧪 Regression Test Results\n\n[View Allure Report](${repoUrl}/allure-report) | Commit: \`${sha}\``
            });
